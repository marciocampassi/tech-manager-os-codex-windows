nfr_validation:
  security:
    status: PASS
    notes: >
      No user-controlled paths reach this layer in this story. Path traversal
      and permission validation are caller responsibilities (Story 1.6+).
  performance:
    status: PASS
    notes: >
      Atomic write costs one extra rename syscall per write — negligible.
      ensureDir on every writeFile is a single stat on a warm cache; correct
      over fast. appendFile is non-atomic by design (documented in method JSDoc);
      single-writer scenarios are safe.
  reliability:
    status: PASS
    notes: >
      Atomic write guarantees no partial writes. Best-effort temp-file cleanup
      swallows cleanup errors to surface the original write error. pathExists
      never throws. All fs-extra errors normalised to FileSystemError.
      appendFile creates parent dirs before appending — handles missing-dir case.
  maintainability:
    status: PASS
    notes: >
      Single-responsibility class with clean method signatures. FileSystemError
      carries operation + path + cause for debuggability. Mockable by design
      via fresh instantiation in tests. appendFile and listFiles constraints
      (non-atomic, non-recursive, excludes symlinks) now documented in JSDoc.

