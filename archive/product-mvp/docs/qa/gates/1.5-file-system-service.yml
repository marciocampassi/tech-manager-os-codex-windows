arch_debt_changes:
  - id: "ARCH-1.5-04-PARTIAL"
    severity: high
    title: "appendFile + listFiles added (2 of 4 missing methods)"
    status: PARTIAL_FIXED
    resolution: >
      appendFile(filePath, content): creates parent dirs then appends content.
      listFiles(dirPath, extension?): non-recursive, excludes directories and symlinks,
      returns absolute paths. Both wrapped with FileSystemError on failure.
      14 new unit tests added (7 per method) covering happy paths, extension filter,
      directory exclusion, and all error paths.
    remaining: >
      parseFrontmatter() and appendFrontmatter() remain outstanding.
      Required for Epic 2 inbox processing (reading/writing YAML front matter in .md files).
      Recommend creating Epic 2 prerequisite story.
    qa_findings_during_review:
      - id: "QA-1.5-DEV-01"
        severity: LOW
        title: "appendFile non-atomicity not documented"
        status: FIXED_BY_QA
        description: >
          appendFile does not use the atomic temp-file/rename pattern that writeFile uses.
          For append semantics atomicity isn't achievable via rename (the temp file would
          replace the target, losing prior content). This design decision was correct but
          undocumented — future maintainers might try to 'fix' it by applying the
          writeFile pattern, breaking append behaviour.
        fix: "Added JSDoc NOTE to appendFile documenting non-atomic nature and the reason."
      - id: "QA-1.5-DEV-02"
        severity: LOW
        title: "listFiles constraints not documented"
        status: FIXED_BY_QA
        description: >
          listFiles is non-recursive (top-level only) and excludes symlinks
          (Dirent.isFile() returns false for symlinks). These constraints were
          undocumented — callers expecting deep listing would be silently surprised.
        fix: "Updated JSDoc: added 'non-recursive — top level only', symlink exclusion note, and return order note."

