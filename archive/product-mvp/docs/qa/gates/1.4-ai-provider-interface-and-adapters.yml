nfr_validation:
  security:
    status: PASS
    notes: >
      API keys are constructor args only — no env-scanning or logging in this layer.
      ConfigService (Story 1.3) owns key storage/redaction. AIProviderError.cause
      retains raw SDK errors for debugging but is not surfaced to users here.
  performance:
    status: PASS
    notes: >
      Exponential backoff capped at 10s. enforceRateLimit exits immediately when
      minIntervalMs=0 (default). No blocking synchronous code.
  reliability:
    status: PASS
    notes: >
      withRetry handles 429 and 5xx with exponential backoff up to maxRetries=3.
      Non-retryable errors (401, 400, 403) thrown immediately. testConnection always
      returns boolean — never throws. All SDK errors normalised to AIProviderError.
  maintainability:
    status: PASS
    notes: >
      Clean interface/base/factory/provider/mock layering. Adding a new provider
      requires only: (1) implement AIProvider via BaseAIProvider, (2) add case to
      AIProviderFactory. No other files need touching. sleep() override pattern
      keeps tests fast without fake timers.

