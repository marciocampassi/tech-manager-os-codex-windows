  AC2:
    desc: "Uses conf library with encryption in OS-specific locations"
    status: PASS
    evidence: "conf@15.1.0; encryptionKey: 'tm-config-v1' (AES-256-CBC); projectName routes to OS-correct dir"

  AC3:
    desc: "Config schema defined with TypeScript interface"
    status: PASS
    evidence: "AppConfig interface + CONFIG_KEYS + ENV_MAP in src/types/config.types.ts"

  AC4:
    desc: "API keys never logged (redaction in place)"
    status: PASS
