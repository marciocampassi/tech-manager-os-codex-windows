      QA finding: redact() existed but was not imported/used in ConfigService.
      Fixed: added getRedacted(key) method to ConfigService; imports and delegates to redact().
      3 tests added covering masked output, (not set) case, and env var masking.

  AC5:
    desc: "Environment variable support: TM_PROVIDER, TM_API_KEY"
    status: PASS
    evidence: "get() and has() both check env vars first; ENV_MAP documents the mapping; afterEach cleanup in tests"

  AC6:
