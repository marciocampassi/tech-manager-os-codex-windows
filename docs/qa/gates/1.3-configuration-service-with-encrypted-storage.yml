# ─── Issues Found ──────────────────────────────────────────────────────────
issues:
  - id: "QA-1.3-01"
    severity: MINOR
    title: "redact() utility defined but not wired into ConfigService"
    status: FIXED
    description: |
      AC4 requires 'redaction in place'. redact() was in src/utils/redact.ts
      but config.service.ts had no import of it — no active enforcement that
      future logging paths would use it.
    fix: |
      Added getRedacted(key): string method to ConfigService. Imports redact()
      and delegates all value masking through it. Future command code uses
      getRedacted() whenever displaying config values in CLI output.

  - id: "QA-1.3-02"
    severity: MINOR
    title: "initialize() test only verified no-throw, not dotenv.config invocation"
    status: FIXED
    description: |
      The test 'initialize() can be called without throwing' gives no confidence
      that dotenv.config() is actually called — the test would pass even if
      initialize() was an empty function.
    fix: |
      Replaced with 'initialize() calls dotenv.config()' using:
      expect(dotenv.config).toHaveBeenCalled() against the mocked dotenv module.

  - id: "QA-1.3-03"
    severity: MINOR
    title: "apiKey had no round-trip storage test"
    status: FIXED
    description: |
      Only 'provider' had an explicit set→get round-trip test. 'apiKey' only
      appeared in the delete test and env-precedence tests — its basic storage
      path was not independently verified.
    fix: "Added 'set + get round-trip returns the stored value for apiKey' test."

  - id: "QA-1.3-04"
    severity: CONCERNS
    title: "Module-level configService singleton — same pattern as QA-1.2-03"
    status: OPEN — DEFERRED
    description: |
      configService is exported as a module-level singleton (new ConfigService()
      at import time). This is consistent with Story 1.2's program singleton.
      In tests it's safe because conf is mocked before import. But tests use
      fresh new ConfigService() instances — the singleton itself is never tested.
    recommendation: "Same resolution as QA-1.2-03: addressed when wired in Story 1.6."
    deferred_to: "Story 1.6"

  - id: "QA-1.3-05"
    severity: MINOR
    title: "Redundant type cast in set()"
    status: OPEN — ACCEPTED
    description: |
      this.store.set(key, value as AppConfig[K]) — the cast is unnecessary
      since value is already typed as AppConfig[K] by the generic constraint.
      Cosmetic only; TypeScript still compiles cleanly.
    accepted_risk: true

