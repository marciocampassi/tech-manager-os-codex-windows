# ─── Arch-Debt Re-Review 2026-02-26 ────────────────────────────────────────
# Dev agent applied: config path fix (cwd override), 6 high-level domain methods,
# Winston logger utility. QA re-reviewed all changes.
arch_debt_review_date: "2026-02-26"
arch_debt_gate: PASS

arch_debt_changes:
  - id: "ARCH-1.3-03"
    severity: high
    title: "Config file path fixed — now targets ~/.config/tmr/config.json"
    status: FIXED
    resolution: >
      ConfigService constructor now passes cwd: join(homedir(), '.config', 'tmr')
      to Conf. With cwd explicit, conf uses configName (default: 'config') as the
      filename → ~/.config/tmr/config.json. Architecture-mandated path achieved.
    note: >
      encryptionKey changed tm-config-v1 → tmr-config-v1 (aligned with binary
      rename). Pre-release breaking change: existing stored configs are not
      portable across this change. Low severity for pre-release; document in
      CHANGELOG when releasing.

  - id: "ARCH-1.3-04"
    severity: high
    title: "High-level domain API implemented"
    status: FIXED
    resolution: >
      Added: getActiveProvider(), setActiveProvider(name), addProvider(name, apiKey, model),
      getProviderConfig(name), getWorkspacePath(), getConfidenceThreshold().
      All 6 methods tested (14 new tests; 46 tests total for config suite).
    qa_findings_during_review:
      - id: "QA-1.3-DEV-01"
        severity: MEDIUM
        title: "addProvider parameter named 'apiKeyEncrypted' — misleading"
        status: FIXED_BY_QA
        description: >
          The parameter name 'apiKeyEncrypted' implied callers should pre-encrypt
          the API key, but conf handles encryption transparently. This is a documentation
          and API design defect — future callers would be misled about their
          responsibilities. The ProviderConfig field api_key_encrypted refers to what
          is on disk after conf encryption, not to caller responsibility.
        fix: >
          Renamed parameter apiKeyEncrypted → apiKey in addProvider().
          Updated ProviderConfig.api_key_encrypted JSDoc to clarify conf encrypts at storage time.
          Updated test data strings from 'enc-key-abc' → 'sk-ant-raw-key' to remove
          misleading 'enc-' prefix in test assertions.

  - id: "ARCH-DEBT-009"
    severity: medium
    title: "Winston 3.x logger utility created"
    status: FIXED
    resolution: >
      src/utils/logger.ts created. winston@3.19.0 added to dependencies.
      Logger targets ~/.config/tmr/logs/tmr.log (file transport) + console.
      File transport omitted in NODE_ENV=test; console silenced in test mode.
    qa_findings_during_review:
      - id: "QA-1.3-DEV-02"
        severity: HIGH
        title: "Logger File transport crashes if log directory does not exist"
        status: FIXED_BY_QA
        description: >
          winston File transport does NOT create parent directories automatically.
          If ~/.config/tmr/logs/ does not exist on a fresh system, the File transport
          emits an uncaught error event which crashes the process. This is a latent
          crash-on-first-run bug that would surface when logger is wired into services.
        fix: >
          Added mkdirSync(LOG_DIR, { recursive: true }) before createLogger() in
          src/utils/logger.ts, guarded by !IS_TEST. Wrapped in try/catch so the
          app degrades gracefully (console transport remains functional) if the
          directory cannot be created (e.g., permissions issue).
      - id: "QA-1.3-DEV-03"
        severity: MEDIUM
        title: "File transport wrote to real filesystem during tests"
        status: FIXED_BY_QA
        description: >
          The Console transport was silenced via 'silent: NODE_ENV=test' but the
          File transport was always created, causing real fs writes to
          ~/.config/tmr/logs/tmr.log from within test runs.
        fix: >
          File transport is conditionally omitted entirely when IS_TEST is true:
          '...(!IS_TEST ? [new transports.File(...)] : [])'. No filesystem writes
          from logger during test execution.

