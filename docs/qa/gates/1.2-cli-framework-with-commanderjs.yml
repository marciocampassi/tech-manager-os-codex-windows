# ─── Issues Found ──────────────────────────────────────────────────────────
issues:
  - id: "QA-1.2-01"
    severity: MINOR
    title: "Test stdout leak — global flags tests wrote to real stdout"
    status: FIXED
    description: |
      Global flags tests executed init stub actions without mocking stdout,
      causing 3x 'coming soon' messages + full help + version to print during
      test run. Cosmetic but indicates incomplete test isolation.
    fix: "Added jest.spyOn(process.stdout, 'write').mockImplementation() to all 5 tests that trigger output."

  - id: "QA-1.2-02"
    severity: MINOR
    title: "AC4 had no unit test — only e2e verified"
    status: FIXED
    description: |
      'tm with no args shows help' was validated manually (e2e) but had no
      automated unit coverage. Any regression in the argv.length guard
      would be silent.
    fix: "Added 'no-args shows help output (AC4)' test to 'CLI — --help and --version' describe block."

  - id: "QA-1.2-03"
    severity: CONCERNS
    title: "run() is hardwired to module-level program singleton"
    status: OPEN — DEFERRED
    description: |
      createProgram() was introduced to enable fresh instances per test.
      However, run() references the exported singleton `program`, not a
      factory-generated instance. This means:
        1. run() cannot be unit tested with the same isolation pattern
        2. If run() is called twice, it reuses a stateful program instance
      The JEST_WORKER_ID guard prevents the issue in practice, but the
      design is inconsistent.
    recommendation: |
      In Story 1.6+ (when commands are real), refactor run() to accept
      an optional Command instance: run(argv?, p = program). This allows
      unit tests to inject a fresh program without the singleton.
    deferred_to: "Story 1.6 (command implementations)"

  - id: "QA-1.2-04"
    severity: CONCERNS
    title: "JEST_WORKER_ID guard couples production code to test infrastructure"
    status: OPEN — ACCEPTED
    description: |
      Using process.env.JEST_WORKER_ID to skip module-level execution is
      a common pattern but creates an implicit coupling between src/cli.ts
      and the Jest runtime. If the test runner changes (e.g., Vitest uses
      VITEST env var), this guard silently breaks.
    recommendation: |
      Document this assumption in a code comment or migrate to an
      import.meta.url !== process.argv[1] guard when tsup/Node ESM
      support matures. Acceptable risk for this stage.
    accepted_risk: true

