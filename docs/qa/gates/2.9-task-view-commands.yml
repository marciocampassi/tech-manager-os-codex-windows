top_issues:
  - id: QA-2.9-01
    severity: medium
    description: >
      AC 8 test case "Error when workspace not initialized" is absent.
      The command silently falls back to process.cwd() via getWorkspaceRoot() when
      configService.getWorkspacePath() returns null. Whether this is graceful degradation
      or an error condition is ambiguous in the story. A test asserting the fallback
      behavior (showing empty state from cwd) should be added.
    suggested_owner: dev
    refs:
      - tests/commands/task-view.command.test.ts
      - src/commands/task-view.command.ts

