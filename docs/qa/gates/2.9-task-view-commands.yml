  security:
    status: PASS
    notes: >
      No auth/sensitive data. File reads are scoped to workspace root.
      No user input passed to file paths unsanitized (period is a fixed enum).
  performance:
    status: PASS
    notes: >
      Single file read per command. No expensive operations. date-fns formatting is O(1).
      Empty state shown instantly when file missing.
  reliability:
    status: PASS
